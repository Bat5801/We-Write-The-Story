<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Write The Stories - Story Editor</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  </head>
  <body>
    <div id="editor-container">
      <div id="header">
        <h1>I Write The Stories</h1>
        <p class="subtitle">故事编辑器</p>
        <div class="header-buttons">
          <button class="pixel-btn" onclick="editor.newStory()">新建</button>
          <button class="pixel-btn" onclick="editor.importStory()">导入</button>
          <button class="pixel-btn" onclick="editor.exportStory()">导出</button>
          <button class="pixel-btn" onclick="editor.testStory()">测试</button>
          <button
            class="pixel-btn"
            onclick="window.location.href = '../index.html'"
          >
            返回游戏
          </button>
        </div>
      </div>

      <div id="main-content">
        <button
          id="toggle-sidebar"
          class="toggle-btn"
          onclick="editor.toggleSidebar()"
        >
          ◀
        </button>

        <div id="sidebar">
          <div class="panel">
            <h3>📝 故事信息</h3>
            <input
              type="text"
              id="story-title"
              placeholder="故事标题"
              oninput="editor.updateStoryInfo()"
            />
            <input
              type="text"
              id="story-subtitle"
              placeholder="副标题"
              oninput="editor.updateStoryInfo()"
            />
            <textarea
              id="story-desc"
              placeholder="故事描述"
              oninput="editor.updateStoryInfo()"
            ></textarea>
          </div>

          <div class="panel">
            <h3>🎯 启用功能</h3>
            <label
              ><input
                type="checkbox"
                id="enable-inventory"
                onchange="editor.updateFeatures()"
              />
              背包系统</label
            >
            <label
              ><input
                type="checkbox"
                id="enable-map"
                onchange="editor.updateFeatures()"
              />
              地图系统</label
            >
          </div>

          <div class="panel">
            <h3>📋 节点列表</h3>
            <div id="node-list"></div>
            <button class="pixel-btn small" onclick="editor.setStartNode()">
              设为开始节点
            </button>
          </div>

          <div class="panel">
            <h3>🎒 物品管理</h3>
            <div id="item-list"></div>
            <button class="pixel-btn small" onclick="editor.addItem()">
              + 添加物品
            </button>
          </div>
        </div>

        <div id="blockly-area">
          <div id="blockly-toolbar">
            <span class="toolbar-hint">💡 从左侧拖拽积木创建节点和剧情</span>
          </div>
          <div id="blockly-workspace"></div>
        </div>

        <button
          id="toggle-preview"
          class="toggle-btn"
          onclick="editor.togglePreview()"
        >
          ▶
        </button>

        <div id="preview-panel">
          <h3>👁️ 预览</h3>
          <div id="preview-content"></div>
        </div>
      </div>

      <input
        type="file"
        id="file-input"
        accept=".story,.json"
        multiple
        style="display: none"
        onchange="editor.handleFileImport(event)"
      />
    </div>

    <div id="item-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-title">添加物品</div>
        <input type="text" id="item-id" placeholder="物品ID" />
        <input type="text" id="item-name" placeholder="物品名称" />
        <input type="text" id="item-icon" placeholder="物品图标 (如: 📱)" />
        <textarea id="item-desc" placeholder="物品描述"></textarea>
        <div class="modal-buttons">
          <button class="pixel-btn" onclick="editor.createItem()">创建</button>
          <button class="pixel-btn" onclick="editor.closeModal()">取消</button>
        </div>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
      <div id="modal-content" class="modal-content">
        <div id="modal-title" class="modal-title">提示</div>
        <div id="modal-message" class="modal-message"></div>
        <div id="modal-buttons" class="modal-buttons"></div>
      </div>
    </div>

    <script src="editor.js"></script>
  </body>
</html>
